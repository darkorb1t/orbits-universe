<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Order - Orbit's Universe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: radial-gradient(circle at top right, #1a0b2e, #0d021a, #05000a); background-attachment: fixed; min-height: 100vh; font-family: sans-serif; overflow-x: hidden; }
        
        #main-content { padding-bottom: 150px; }

        /* Real Floating Glass Nav */
        .nav-container { position: fixed; bottom: 30px; left: 0; right: 0; z-index: 1500; display: flex; justify-content: center; padding: 0 20px; }
        .nav-glass { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(25px) saturate(180%); 
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 100px; 
            padding: 10px;
            display: flex;
            gap: 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .nav-item { 
            color: rgba(255, 255, 255, 0.4); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            width: 80px; 
            height: 65px; 
            border-radius: 40px; 
        }
        .nav-item i { width: 24px; height: 24px; stroke-width: 2.2px; }
        .nav-text { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
        
        .nav-active { 
            color: white !important; 
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    
    <div id="main-content" class="w-full max-w-lg rounded-[60px] border border-white/20 bg-white/[0.05] p-8 md:p-12 text-center shadow-2xl backdrop-blur-[60px] text-white">
        <h3 id="pName" class="text-3xl font-black mb-2 tracking-tight">Loading...</h3>
        <p id="pDesc" class="text-white/60 mb-6 px-4 text-sm leading-relaxed">Premium private subscription with full access.</p>
        
        <div class="mb-6 rounded-[35px] bg-[#6e3bff]/20 py-6 text-5xl font-black drop-shadow-[0_0_15px_rgba(110,59,255,0.4)]">
            <span id="pPrice">--</span>৳
        </div>

        <div class="mb-6 p-5 rounded-[30px] bg-black/30 border border-white/10 text-left">
            <p class="text-[10px] opacity-50 uppercase font-black mb-2 tracking-widest text-purple-400">Payment Instruction</p>
            <p class="text-md font-bold mb-1">💸 bKash (Personal):</p>
            <p class="text-xl font-mono text-purple-400 font-black tracking-wider text-center py-2">01611026722</p>
            <p class="text-[10px] mt-2 text-white/40">* Send money and enter 10-digit TrxID below.</p>
        </div>

        <div class="space-y-3 text-left">
            <input id="trxId" type="text" maxlength="10" placeholder="Enter 10-digit TrxID" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 focus:outline-none focus:border-purple-500 transition uppercase">
            <input id="userContact" type="text" placeholder="Email or @TelegramUsername" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 focus:outline-none focus:border-purple-500 transition">
            
            <div id="captchaBox" class="flex items-center space-x-4 p-4 rounded-2xl bg-white/5 border border-white/10">
                <span id="captchaText" class="font-mono font-bold text-purple-400"></span>
                <input id="captchaInput" type="number" placeholder="Result?" class="w-20 bg-transparent border-b border-white/20 focus:outline-none focus:border-purple-500 text-center">
            </div>

            <button id="sBtn" onclick="sendOrder()" class="w-full rounded-3xl bg-gradient-to-r from-[#6e3bff] to-[#a334ff] py-5 font-black text-white shadow-xl hover:scale-[1.02] active:scale-95 transition-all disabled:opacity-50">
                Submit Order
            </button>
        </div>
        
        <footer class="mt-10 opacity-20 text-[10px] uppercase tracking-widest">
            Orbit's Universe © 2026
        </footer>
    </div>

    <div class="nav-container">
        <nav class="nav-glass">
            <a href="index.html" class="nav-item">
                <i data-lucide="home"></i>
                <span class="nav-text">Home</span>
            </a>
            <a href="universe.html" class="nav-item">
                <i data-lucide="layout-grid"></i>
                <span class="nav-text">Live</span>
            </a>
            <a href="support.html" class="nav-item">
                <i data-lucide="message-circle"></i>
                <span class="nav-text">Help</span>
            </a>
        </nav>
    </div>

    <script>
        lucide.createIcons();

        const params = new URLSearchParams(window.location.search);
        const product = params.get('product');

        const botToken = "7721560798:AAEWRqAYWWlKvjEZNrU-O4lvozMyoXYKXiM"; 
        const chatId = "6250222523"; 

        let capRes;
        function genCap() {
            const a = Math.floor(Math.random() * 10) + 1;
            const b = Math.floor(Math.random() * 10) + 1;
            capRes = a + b;
            document.getElementById('captchaText').innerText = `${a} + ${b} = `;
        }
        genCap();

        const data = {
            'surfshark': { name: 'Surfshark VPN', price: '28', desc: 'Premium personal account with full private access.' },
            'pia': { name: 'PIA VPN', price: '28', desc: 'Ultimate anonymity and military-grade encryption.' },
            'proton_shared': { name: 'Proton Shared', price: '30', desc: '30 Days shared access with Swiss security.' },
            'proton_personal': { name: 'Proton Personal', price: '80', desc: 'Full private account. I will provide a new Mail ID & Password.' },
            'yt_premium': { name: 'YouTube Premium', price: '25', desc: 'Ad-free experience with Background Play (Family Invite).' },
            'yt_renewable': { name: 'YT Renewable', price: '80', desc: 'Monthly renewable premium on your own account.' }
        };

        if(data[product]) {
            const item = data[product];
            document.getElementById('pName').innerText = item.name;
            document.getElementById('pPrice').innerText = item.price;
            document.getElementById('pDesc').innerText = item.desc;
        }

        function sendOrder() {
            const trx = document.getElementById('trxId').value.trim().toUpperCase();
            const contact = document.getElementById('userContact').value.trim();
            const capIn = document.getElementById('captchaInput').value;
            const btn = document.getElementById('sBtn');

            if(!trx || !contact || !capIn) return alert("All fields are required!");
            if(trx.length !== 10) return alert("bKash TrxID must be exactly 10 characters!");
            const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(contact);
            const isTG = contact.startsWith('@') && contact.length > 2;
            if(!isEmail && !isTG) return alert("Enter a valid Email or @TelegramUsername!");

            if(parseInt(capIn) !== capRes) {
                alert("Wrong Captcha result!");
                genCap();
                return;
            }

            btn.disabled = true;
            btn.innerText = "Processing...";

            const pName = document.getElementById('pName').innerText;
            const pPrice = document.getElementById('pPrice').innerText;

            const botText = `🚀 NEW ORDER!\n\nProduct: ${pName}\nAmount: ${pPrice}৳\nTrxID: ${trx}\nContact: ${contact}`;
            const botUrl = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(botText)}`;

            fetch(botUrl)
            .then(res => {
                if(res.ok) {
                    alert("Order Submitted! Redirecting to WhatsApp for confirmation.");
                    const myNumber = "8801611026722"; 
                    const clientMsg = `Hi Orbit! I have submitted an order for ${pName} (${pPrice}tk). My TrxID is: ${trx}`;
                    window.location.href = `https://wa.me/${myNumber}?text=${encodeURIComponent(clientMsg)}`;
                } else {
                    alert("Bot Error! Please contact directly on WhatsApp.");
                    window.location.href = `https://wa.me/8801611026722`;
                    btn.disabled = false;
                    btn.innerText = "Submit Order";
                }
            })
            .catch(() => {
                alert("Network failure! Try again.");
                btn.disabled = false;
                btn.innerText = "Submit Order";
            });
        }
        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>
</body>
</html>
