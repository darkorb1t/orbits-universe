<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Order - Orbit's Universe</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-6" style="background: radial-gradient(circle at top right, #1a0b2e, #0d021a, #05000a);">
    
    <div class="w-full max-w-lg rounded-[60px] border border-white/20 bg-white/[0.05] p-8 md:p-12 text-center shadow-2xl backdrop-blur-[60px] text-white">
        <h3 id="pName" class="text-3xl font-black mb-2 tracking-tight">Loading...</h3>
        <p id="pDesc" class="text-white/60 mb-6 px-4 text-sm leading-relaxed">Premium private subscription with full access.</p>
        
        <div class="mb-6 rounded-[35px] bg-[#6e3bff]/20 py-6 text-5xl font-black drop-shadow-[0_0_15px_rgba(110,59,255,0.4)]">
            <span id="pPrice">--</span>৳
        </div>

        <div class="mb-6 p-5 rounded-[30px] bg-black/30 border border-white/10 text-left">
            <p class="text-[10px] opacity-50 uppercase font-black mb-2 tracking-widest text-purple-400">Payment Instruction</p>
            <p class="text-md font-bold mb-1">💸 bKash (Personal):</p>
            <p class="text-xl font-mono text-purple-400 font-black tracking-wider text-center py-2">01611026722</p>
            <p class="text-[10px] mt-2 text-white/40">* Send money and enter 10-digit TrxID below.</p>
        </div>

        <div class="space-y-3 text-left">
            <input id="trxId" type="text" maxlength="10" placeholder="Enter 10-digit TrxID (e.g. DC21LVVOIL)" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 focus:outline-none focus:border-purple-500 transition uppercase">
            
            <input id="userContact" type="text" placeholder="Email or @TelegramUsername" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 focus:outline-none focus:border-purple-500 transition">
            
            <div id="captchaBox" class="flex items-center space-x-4 p-4 rounded-2xl bg-white/5 border border-white/10">
                <span id="captchaText" class="font-mono font-bold text-purple-400"></span>
                <input id="captchaInput" type="number" placeholder="Result?" class="w-20 bg-transparent border-b border-white/20 focus:outline-none focus:border-purple-500 text-center">
            </div>

            <button id="sBtn" onclick="sendOrder()" class="w-full rounded-3xl bg-gradient-to-r from-[#6e3bff] to-[#a334ff] py-5 font-black text-white shadow-xl hover:scale-[1.02] active:scale-95 transition-all disabled:opacity-50">
                Submit Order
            </button>
        </div>
        
        <button onclick="history.back()" class="mt-8 text-white/40 hover:text-white transition text-sm">← Go Back</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const product = params.get('product');

        // BOT CONFIGURATION
        const botToken = "7721560798:AAEWRqAYWWlKvjEZNrU-O4lvozMyoXYKXiM"; 
        const chatId = "6250222523"; 

        // Captcha Logic
        let capRes;
        function genCap() {
            const a = Math.floor(Math.random() * 10) + 1;
            const b = Math.floor(Math.random() * 10) + 1;
            capRes = a + b;
            document.getElementById('captchaText').innerText = `${a} + ${b} = `;
        }
        genCap();

        const data = {
            'surfshark': { name: 'Surfshark VPN', price: '28', desc: 'High-speed shared account with global servers.' },
            'pia': { name: 'PIA VPN', price: '28', desc: 'Ultimate anonymity and military-grade encryption.' },
            'proton_shared': { name: 'Proton Shared', price: '30', desc: 'Swiss-based security with 30 days shared access.' },
            'proton_personal': { name: 'Proton Personal', price: '80', desc: 'Private account on your own email for 30 days.' },
            'yt_premium': { name: 'YouTube Premium', price: '25', desc: 'Ad-free experience with Background Play (Family Invite).' },
            'yt_renewable': { name: 'YT Renewable', price: '80', desc: 'Monthly renewable premium on your own account.' }
        };

        if(data[product]) {
            const item = data[product];
            document.getElementById('pName').innerText = item.name;
            document.getElementById('pPrice').innerText = item.price;
            document.getElementById('pDesc').innerText = item.desc;
        }

        function sendOrder() {
            const trx = document.getElementById('trxId').value.trim().toUpperCase();
            const contact = document.getElementById('userContact').value.trim();
            const capIn = document.getElementById('captchaInput').value;
            const btn = document.getElementById('sBtn');

            // 1. Basic Validation
            if(!trx || !contact || !capIn) return alert("All fields are required!");

            // 2. TrxID Length Validation (bKash is 10 chars)
            if(trx.length !== 10) return alert("bKash TrxID must be exactly 10 characters!");

            // 3. Contact Validation (Email or @User)
            const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(contact);
            const isTG = contact.startsWith('@') && contact.length > 2;
            if(!isEmail && !isTG) return alert("Enter a valid Email or @TelegramUsername!");

            // 4. Captcha Validation
            if(parseInt(capIn) !== capRes) {
                alert("Wrong Captcha result!");
                genCap();
                return;
            }

            // 5. Spam Protection: Disable Button
            btn.disabled = true;
            btn.innerText = "Processing...";

            const pName = document.getElementById('pName').innerText;
            const pPrice = document.getElementById('pPrice').innerText;

            const botText = `🚀 NEW ORDER!\n\nProduct: ${pName}\nAmount: ${pPrice}৳\nTrxID: ${trx}\nContact: ${contact}`;
            const botUrl = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(botText)}`;

            fetch(botUrl)
            .then(res => {
                if(res.ok) {
                    alert("Order Submitted! Confirming on Telegram.");
                    const clientMsg = `Hi! I ordered ${pName} (${pPrice}tk). TrxID: ${trx}`;
                    window.location.href = `https://t.me/Aedm1n?text=${encodeURIComponent(clientMsg)}`;
                } else {
                    alert("Bot Error! Contact @Aedm1n directly.");
                    btn.disabled = false;
                    btn.innerText = "Submit Order";
                }
            })
            .catch(() => {
                alert("Network failure!");
                btn.disabled = false;
                btn.innerText = "Submit Order";
            });
        }
    </script>
</body>
  </html>
