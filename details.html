<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Order - Orbit's Universe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at top right, #1a0b2e, #0d021a, #05000a); background-attachment: fixed; min-height: 100vh; font-family: 'Inter', sans-serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        
        #main-content { padding-bottom: 150px; transition: 0.5s ease-in-out; }

        .premium-font { font-family: 'Outfit', sans-serif; font-style: italic; }

        /* Unified 40px Blur Nav */
        .nav-container { position: fixed; bottom: 30px; left: 0; right: 0; z-index: 1500; display: flex; justify-content: center; padding: 0 20px; }
        .nav-glass { 
            background: rgba(255, 255, 255, 0.03) !important; 
            backdrop-filter: blur(40px) saturate(200%) !important; 
            -webkit-backdrop-filter: blur(40px) saturate(200%) !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important; 
            border-radius: 100px; padding: 10px; display: flex; gap: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .nav-item { color: rgba(255, 255, 255, 0.3); transition: 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 80px; height: 65px; border-radius: 40px; }
        .nav-item i { width: 24px; height: 24px; stroke-width: 2.2px; }
        .nav-text { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
        .nav-active { color: white !important; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.1); }

        /* Glass Form Styling */
        .order-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(50px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 60px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        input { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
        input:focus { border-color: #6e3bff !important; box-shadow: 0 0 15px rgba(110, 59, 255, 0.2); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-white">
    
    <div id="main-content" class="w-full max-w-lg order-card p-10 md:p-14 text-center">
        <h3 id="pName" class="premium-font text-4xl mb-3 tracking-tight">Loading...</h3>
        <p id="pDesc" class="text-white/50 mb-8 px-2 text-xs leading-relaxed uppercase tracking-widest font-bold">Premium private subscription with full access.</p>
        
        <div class="mb-8 rounded-[40px] bg-[#6e3bff]/10 border border-[#6e3bff]/20 py-8 text-6xl font-black drop-shadow-[0_0_20px_rgba(110,59,255,0.3)]">
            <span id="pPrice">--</span>৳
        </div>

        <div class="mb-8 p-6 rounded-[35px] bg-black/40 border border-white/5 text-left">
            <p class="text-[9px] opacity-40 uppercase font-black mb-3 tracking-[0.2em] text-purple-400">Payment Instruction</p>
            <div class="flex items-center justify-between">
                <p class="text-md font-black italic">💸 bKash (Personal)</p>
                <p class="text-[9px] bg-white/10 px-3 py-1 rounded-full opacity-50 font-bold uppercase">Send Money</p>
            </div>
            <p class="text-2xl font-mono text-white font-black tracking-widest text-center py-4 drop-shadow-[0_0_10px_rgba(255,255,255,0.2)]">01611026722</p>
            <p class="text-[9px] text-center text-white/30 font-bold uppercase tracking-tighter">* Enter 10-digit TrxID to confirm payment</p>
        </div>

        <div class="space-y-4 text-left">
            <input id="trxId" type="text" maxlength="10" placeholder="ENTER 10-DIGIT TRXID" class="w-full p-5 rounded-[25px] font-mono text-center tracking-widest focus:outline-none transition uppercase">
            <input id="userContact" type="text" placeholder="EMAIL OR @TELEGRAM" class="w-full p-5 rounded-[25px] font-bold text-center tracking-wide focus:outline-none transition">
            
            <div id="captchaBox" class="flex items-center justify-between px-6 py-4 rounded-[25px] bg-white/5 border border-white/10">
                <span id="captchaText" class="font-black text-purple-400 italic tracking-widest"></span>
                <input id="captchaInput" type="number" placeholder="?" class="w-24 bg-transparent border-b border-white/20 focus:outline-none text-center font-black text-xl">
            </div>

            <button id="sBtn" onclick="sendOrder()" class="w-full rounded-[30px] bg-gradient-to-r from-[#6e3bff] to-[#a334ff] py-6 font-black text-white shadow-2xl hover:scale-[1.03] active:scale-95 transition-all disabled:opacity-50 uppercase tracking-widest text-sm">
                Submit Order
            </button>
        </div>
        
        <footer class="mt-12 opacity-20 text-[9px] uppercase tracking-[0.3em] font-black">
            Orbit's Universe © 2026
        </footer>
    </div>

    <div class="nav-container">
        <nav class="nav-glass">
            <a href="index.html" class="nav-item"><i data-lucide="home"></i><span class="nav-text">Home</span></a>
            <a href="universe.html" class="nav-item"><i data-lucide="layout-grid"></i><span class="nav-text">Live</span></a>
            <a href="support.html" class="nav-item"><i data-lucide="message-circle"></i><span class="nav-text">Help</span></a>
        </nav>
    </div>

    <script>
        lucide.createIcons();

        const params = new URLSearchParams(window.location.search);
        const product = params.get('product');

        const botToken = "7721560798:AAEWRqAYWWlKvjEZNrU-O4lvozMyoXYKXiM"; 
        const chatId = "6250222523"; 

        let capRes;
        function genCap() {
            const a = Math.floor(Math.random() * 9) + 1;
            const b = Math.floor(Math.random() * 9) + 1;
            capRes = a + b;
            document.getElementById('captchaText').innerText = `${a} + ${b} =`;
        }
        genCap();

        const data = {
            'surfshark': { name: 'Surfshark VPN', price: '28', desc: 'Premium personal account with full private access.' },
            'pia': { name: 'PIA VPN', price: '28', desc: 'Ultimate anonymity and military-grade encryption.' },
            'proton_shared': { name: 'Proton Shared', price: '30', desc: '30 Days shared access with Swiss security.' },
            'proton_personal': { name: 'Proton Personal', price: '80', desc: 'Full private account. Provided with New Mail & Password.' },
            'yt_premium': { name: 'YouTube Premium', price: '25', desc: 'Non-Renewable Family Invite (30 Days Pack).' },
            'yt_renewable': { name: 'YouTube Premium', price: '80', desc: 'Renewable access on your personal email.' }
        };

        if(data[product]) {
            const item = data[product];
            document.getElementById('pName').innerText = item.name;
            document.getElementById('pPrice').innerText = item.price;
            document.getElementById('pDesc').innerText = item.desc;
        }

        function sendOrder() {
            const trx = document.getElementById('trxId').value.trim().toUpperCase();
            const contact = document.getElementById('userContact').value.trim();
            const capIn = document.getElementById('captchaInput').value;
            const btn = document.getElementById('sBtn');

            if(!trx || !contact || !capIn) return alert("Fill all fields, Bro!");
            if(trx.length !== 10) return alert("TrxID must be 10 characters!");

            if(parseInt(capIn) !== capRes) {
                alert("Wrong Captcha result!");
                genCap();
                return;
            }

            btn.disabled = true;
            btn.innerText = "Processing...";

            const pName = document.getElementById('pName').innerText;
            const pPrice = document.getElementById('pPrice').innerText;

            const botText = `🚀 NEW ORDER!\n\nProduct: ${pName}\nAmount: ${pPrice}৳\nTrxID: ${trx}\nContact: ${contact}`;
            const botUrl = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(botText)}`;

            fetch(botUrl)
            .then(res => {
                if(res.ok) {
                    alert("Order Submitted! Confirm on WhatsApp.");
                    window.location.href = `https://wa.me/8801611026722?text=${encodeURIComponent("Submitted order for " + pName + ". TrxID: " + trx)}`;
                } else {
                    window.location.href = `https://wa.me/8801611026722`;
                }
            })
            .catch(() => {
                alert("Network error! Try again.");
                btn.disabled = false;
                btn.innerText = "Submit Order";
            });
        }
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
