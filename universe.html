<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit's Universe - Live Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* High-Res Background & Sharper Rendering */
        body { 
            background: radial-gradient(circle at top right, #1a0b2e, #0d021a, #05000a); 
            background-attachment: fixed; 
            min-height: 100vh; 
            font-family: 'Inter', sans-serif; 
            color: white; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Vivid Glass Card - Higher Contrast for Premium Vibe */
        .status-card { 
            background: rgba(255, 255, 255, 0.04); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px; 
            border: 1px solid rgba(255, 255, 255, 0.12); 
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .status-card:hover { 
            border-color: rgba(110, 59, 255, 0.6); 
            transform: translateY(-5px) scale(1.01);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 40px rgba(110, 59, 255, 0.15);
        }

        .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin-right: 10px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.6; } 100% { transform: scale(1); opacity: 1; } }

        #main-content { padding-bottom: 150px; }

        /* Premium Navigation Styling */
        .nav-container { position: fixed; bottom: 30px; left: 0; right: 0; z-index: 1500; display: flex; justify-content: center; padding: 0 20px; }
        .nav-glass { 
            background: rgba(15, 15, 15, 0.85); 
            backdrop-filter: blur(25px) saturate(200%); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 100px; 
            padding: 10px;
            display: flex;
            gap: 12px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }
        
        .nav-item { 
            color: rgba(255, 255, 255, 0.4); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            width: 80px; height: 65px; border-radius: 40px; transition: 0.3s;
        }
        
        .nav-active { 
            color: white !important; 
            background: linear-gradient(145deg, rgba(110, 59, 255, 0.3), rgba(163, 52, 255, 0.1));
            border: 1px solid rgba(110, 59, 255, 0.4);
            text-shadow: 0 0 10px rgba(110, 59, 255, 0.5);
        }

        /* Entrance Animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in-card { animation: fadeInUp 0.6s ease-out forwards; }
    </style>
</head>
<body class="p-6 md:p-20">

    <div id="main-content" class="max-w-4xl mx-auto">
        <header class="mb-16 text-center">
            <h1 class="text-6xl font-black tracking-tighter drop-shadow-[0_0_30px_rgba(110,59,255,0.4)] md:text-8xl">Orbit's <span class="text-[#6e3bff]">Universe</span></h1>
            <p class="mt-4 font-bold uppercase tracking-[0.5em] opacity-50 text-[10px] text-purple-300">Live Service Inventory</p>
        </header>

        <div id="inventory-list" class="grid grid-cols-1 gap-8 min-h-[500px]">
            </div>

        <footer class="mt-24 text-center opacity-30 text-[10px] uppercase tracking-widest font-bold">
            Orbit's Universe © 2026
        </footer>
    </div>

    <div class="nav-container">
        <nav class="nav-glass">
            <a href="index.html" class="nav-item"><i data-lucide="home"></i><span class="text-[9px] font-black uppercase mt-1">Home</span></a>
            <a href="universe.html" class="nav-item nav-active"><i data-lucide="layout-grid"></i><span class="text-[9px] font-black uppercase mt-1">Live</span></a>
            <a href="support.html" class="nav-item"><i data-lucide="message-circle"></i><span class="text-[9px] font-black uppercase mt-1">Help</span></a>
        </nav>
    </div>

    <script>
        lucide.createIcons();

        // fetch with timestamp to force fresh data from inventory.json
        fetch('inventory.json?t=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('inventory-list');
                list.innerHTML = ''; 

                data.forEach((item, index) => {
                    const statusText = item.status ? "Active & Ready" : "Out of Stock";
                    const dotClass = item.status ? "bg-green-500 shadow-[0_0_15px_#22c55e]" : "bg-red-500 shadow-[0_0_15px_#ef4444]";
                    const cardOpacity = item.status ? "" : "opacity-50 grayscale-[0.2]";

                    const card = document.createElement('div');
                    card.className = `status-card p-10 flex flex-col md:flex-row items-center justify-between fade-in-card ${cardOpacity}`;
                    card.style.animationDelay = `${index * 0.1}s`; 
                    
                    card.innerHTML = `
                        <div class="flex items-center space-x-8">
                            <div class="text-4xl font-black text-white/10 italic">${item.id}</div>
                            <div>
                                <h3 class="text-3xl font-black tracking-tight">${item.name}</h3>
                                <p class="text-[11px] font-black uppercase tracking-[0.2em] mt-2 flex items-center ${item.status ? 'text-green-400/80' : 'text-red-400/80'}">
                                    <span class="dot ${dotClass}"></span>
                                    ${statusText}
                                </p>
                            </div>
                        </div>
                        <div class="mt-8 md:mt-0 flex items-center space-x-10">
                            <div class="text-right">
                                <p class="text-3xl font-black ${item.status ? 'text-white' : 'text-white/20'}">${item.price}৳</p>
                                <p class="text-[10px] opacity-40 uppercase font-black tracking-widest mt-1">${item.duration}</p>
                            </div>
                            ${item.status 
                                ? `<a href="${item.link}" class="px-10 py-5 rounded-3xl bg-white text-black font-black text-xs uppercase tracking-widest hover:bg-[#6e3bff] hover:text-white transition-all duration-300 shadow-[0_10px_30px_rgba(255,255,255,0.2)]">ORDER</a>`
                                : `<button disabled class="px-10 py-5 rounded-3xl bg-white/5 text-white/20 font-black text-xs uppercase tracking-widest border border-white/5">CLOSED</button>`
                            }
                        </div>
                    `;
                    list.appendChild(card);
                });
            })
            .catch(err => {
                console.error("Update failed:", err);
                document.getElementById('inventory-list').innerHTML = '<div class="text-center py-20 font-bold text-red-500">Sync Error! Check JSON file.</div>';
            });

        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
