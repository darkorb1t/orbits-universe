<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit's Universe - Live Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: radial-gradient(circle at top right, #1a0b2e, #0d021a, #05000a); background-attachment: fixed; min-height: 100vh; font-family: sans-serif; color: white; overflow-x: hidden; }
        .status-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(30px); border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.08); transition: 0.4s; }
        .status-card:hover { border-color: #6e3bff; transform: scale(1.02); }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 10px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        #main-content { padding-bottom: 150px; }

        /* Real Floating Glass Nav */
        .nav-container { position: fixed; bottom: 30px; left: 0; right: 0; z-index: 1500; display: flex; justify-content: center; padding: 0 20px; }
        .nav-glass { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(25px) saturate(180%); 
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 100px; 
            padding: 10px;
            display: flex;
            gap: 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .nav-item { 
            color: rgba(255, 255, 255, 0.4); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            width: 80px; 
            height: 65px; 
            border-radius: 40px; 
        }
        .nav-item i { width: 24px; height: 24px; stroke-width: 2.2px; }
        .nav-text { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
        
        .nav-active { 
            color: white !important; 
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="p-6 md:p-20">

    <div id="main-content" class="max-w-4xl mx-auto">
        <header class="mb-16 text-center">
            <h1 class="text-5xl font-black tracking-tighter drop-shadow-[0_0_20px_rgba(110,59,255,0.6)] md:text-7xl">Orbit's <span class="text-[#6e3bff]">Universe</span></h1>
            <p class="mt-4 font-bold uppercase tracking-[0.3em] opacity-40 text-xs text-purple-200">Real-Time Service Inventory</p>
        </header>

        <div id="inventory-list" class="grid grid-cols-1 gap-6">
            <div class="text-center py-20 opacity-50 font-bold tracking-widest animate-pulse uppercase text-sm">Synchronizing Inventory...</div>
        </div>

        <footer class="mt-20 text-center opacity-20 text-[10px] uppercase tracking-widest">
            Orbit's Universe © 2026
        </footer>
    </div>

    <div class="nav-container">
        <nav class="nav-glass">
            <a href="index.html" class="nav-item">
                <i data-lucide="home"></i>
                <span class="nav-text">Home</span>
            </a>
            <a href="universe.html" class="nav-item nav-active">
                <i data-lucide="layout-grid"></i>
                <span class="nav-text">Live</span>
            </a>
            <a href="support.html" class="nav-item">
                <i data-lucide="message-circle"></i>
                <span class="nav-text">Help</span>
            </a>
        </nav>
    </div>

    <script>
        lucide.createIcons();

        // Fetch Data from JSON
        fetch('inventory.json')
            .then(response => response.json())
            .then(data => {
                const list = document.getElementById('inventory-list');
                list.innerHTML = ''; // Clear loading placeholder

                data.forEach(item => {
                    const card = document.createElement('div');
                    // Add lower opacity and specific border for out-of-stock items
                    card.className = `status-card p-8 flex flex-col md:flex-row items-center justify-between ${!item.status ? 'opacity-60 border-red-500/20' : ''}`;
                    
                    card.innerHTML = `
                        <div class="flex items-center space-x-6">
                            <div class="text-3xl font-black text-white/20">${item.id}</div>
                            <div>
                                <h3 class="text-2xl font-black">${item.name}</h3>
                                <p class="text-xs opacity-50 font-bold uppercase tracking-widest">
                                    <span class="dot ${item.status ? 'bg-green-500 shadow-[0_0_10px_#22c55e]' : 'bg-red-500'}"></span>
                                    ${item.statusText}
                                </p>
                            </div>
                        </div>
                        <div class="mt-6 md:mt-0 flex items-center space-x-8">
                            <div class="text-right">
                                <p class="text-2xl font-black ${item.status ? 'text-purple-400' : 'text-white/20'}">${item.price}৳</p>
                                <p class="text-[10px] opacity-30 uppercase font-black">${item.duration}</p>
                            </div>
                            ${item.status 
                                ? `<a href="${item.link}" class="px-8 py-4 rounded-2xl bg-white text-[#6e3bff] font-black text-sm hover:bg-[#6e3bff] hover:text-white transition shadow-lg">ORDER</a>`
                                : `<button disabled class="px-8 py-4 rounded-2xl bg-white/5 text-white/20 font-black text-sm cursor-not-allowed border border-white/5 uppercase">Closed</button>`
                            }
                        </div>
                    `;
                    list.appendChild(card);
                });
            })
            .catch(error => {
                console.error('Error loading inventory:', error);
                document.getElementById('inventory-list').innerHTML = '<div class="text-center text-red-500 font-bold">Failed to load inventory. Check your JSON file.</div>';
            });

        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>
</body>
</html>
